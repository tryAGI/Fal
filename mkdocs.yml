site_name: Fal .NET Documentation
site_description: Documentation for the tryAGI .NET SDK for Fal.
site_url: https://tryagi.github.io/Fal/
repo_url: https://github.com/tryAGI/Fal
repo_name: tryAGI/Fal
edit_uri: edit/main/docs/
nav:
- Overview: index.md
# EXAMPLES:START
- Examples:
  - Apps Get Meta Returns Platform Metadata: examples/apps-get-meta-returns-platform-metadata.md
  - Apps Get Pricing Returns Price For Endpoint: examples/apps-get-pricing-returns-price-for-endpoint.md
  - Apps Search Requests Returns Results: examples/apps-search-requests-returns-results.md
  - Billing Get Account Billing Returns Username: examples/billing-get-account-billing-returns-username.md
  - Billing Get Usage Returns Usage Data: examples/billing-get-usage-returns-usage-data.md
  - Secrets: examples/secrets.md
# EXAMPLES:END

theme:
  name: tryagi
  favicon: 'media/icon128.png'

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
